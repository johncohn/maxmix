<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaxMix — Happy Birthday</title>
  <link rel="alternate" type="application/json+oembed" href="https://johncohn.github.io/maxmix/oembed.json" title="MaxMix — Happy Birthday">
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100vw;
      max-height: 100vh;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      z-index: 10;
      font-family: sans-serif;
    }
    #muteBtn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 20;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: #fff;
      font-size: 1.8rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      border-radius: 8px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    #muteBtn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    #filterBtn {
      position: fixed;
      top: 5.5rem;
      left: 1.5rem;
      z-index: 20;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: #fff;
      font-size: 1.8rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      border-radius: 8px;
      backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s;
    }
    #filterBtn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    #filterBtn.active {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
    }
    #filterName {
      position: fixed;
      top: 9.5rem;
      left: 1.5rem;
      z-index: 20;
      color: rgba(255,255,255,0.8);
      font-family: sans-serif;
      font-size: 0.85rem;
      text-align: left;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <video id="vidA" muted playsinline></video>
  <video id="vidB" muted playsinline style="display:none"></video>
  <div id="overlay"><span>Tap to Start</span></div>
  <button id="muteBtn">🔇</button>
  <button id="filterBtn">🎨</button>
  <div id="filterName"></div>

  <script>
    const CLIPS = [1, 2, 3, 4, 5];
    const vidA = document.getElementById('vidA');
    const vidB = document.getElementById('vidB');
    const overlay = document.getElementById('overlay');
    const muteBtn = document.getElementById('muteBtn');

    function pickExcept(exclude) {
      const pool = CLIPS.filter(n => n !== exclude);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function buildSong() {
      const s1 = CLIPS[Math.floor(Math.random() * CLIPS.length)];
      const s2 = pickExcept(s1);
      const s3 = pickExcept(s2);
      const s4 = pickExcept(s3);
      return [
        `clips/c${s1}_s1.mp4`,
        `clips/c${s2}_s2.mp4`,
        `clips/c${s3}_s3.mp4`,
        `clips/c${s4}_s4.mp4`,
        `clips/c5_s5.mp4`,
      ];
    }

    let queue = [...buildSong(), ...buildSong()];
    let active = vidA;
    let standby = vidB;

    function loadInto(el, src) {
      el.src = src;
      el.preload = 'auto';
      el.load();
    }

    function nextRandomFilter() {
      let next;
      do { next = Math.floor(Math.random() * FILTERS.length); } while (next === lastFilter);
      lastFilter = next;
      const f = FILTERS[next];
      vidA.style.filter = f.value;
      vidB.style.filter = f.value;
      filterName.textContent = f.name;
    }

    function advance() {
      if (queue.length < 3) {
        queue = queue.concat(buildSong());
      }

      // Pause active before hiding so its audio stops immediately
      active.pause();
      standby.style.display = '';
      active.style.display = 'none';
      standby.play().catch(() => {});

      if (filterActive) nextRandomFilter();

      // Load next-next clip into the now-hidden active element
      const nextSrc = queue.shift();
      loadInto(active, nextSrc);

      // Swap references
      const tmp = active;
      active = standby;
      standby = tmp;
    }

    function attachHandlers(el) {
      el.addEventListener('ended', advance);
      el.addEventListener('error', () => {
        // Skip bad clip gracefully
        if (queue.length > 0) {
          advance();
        }
      });
    }

    attachHandlers(vidA);
    attachHandlers(vidB);

    // Seed: load first clip into active, second into standby
    loadInto(active, queue.shift());
    loadInto(standby, queue.shift());

    // Attempt autoplay
    const p = vidA.play();
    if (p !== undefined) {
      p.catch(() => {
        overlay.style.display = 'flex';
      });
    }

    function unmute() {
      vidA.muted = false;
      vidB.muted = false;
      muteBtn.textContent = '🔊';
    }

    // Overlay tap: start playback AND unmute in one gesture
    overlay.addEventListener('click', () => {
      unmute();
      active.play().then(() => overlay.remove());
    }, { once: true });

    // Silent autoplay succeeded (no overlay): unmute on first tap anywhere
    document.addEventListener('click', unmute, { once: true });
    document.addEventListener('touchstart', unmute, { once: true });

    muteBtn.addEventListener('click', () => {
      const nowMuted = !vidA.muted;
      vidA.muted = nowMuted;
      vidB.muted = nowMuted;
      muteBtn.textContent = nowMuted ? '🔇' : '🔊';
    });

    const FILTERS = [
      { name: 'B&W',           value: 'grayscale(1)' },
      { name: 'Sepia',         value: 'sepia(1)' },
      { name: 'Negative',      value: 'invert(1)' },
      { name: 'Green shift',   value: 'hue-rotate(90deg) saturate(1.5)' },
      { name: 'Complementary', value: 'hue-rotate(180deg)' },
      { name: 'High contrast', value: 'contrast(2.5) saturate(0.8)' },
      { name: 'Oversaturated', value: 'saturate(4) contrast(1.2)' },
      { name: 'Warm',          value: 'sepia(0.5) saturate(1.8) hue-rotate(-20deg)' },
      { name: 'Cool',          value: 'saturate(1.5) hue-rotate(200deg) brightness(1.1)' },
      { name: 'Psychedelic',   value: 'hue-rotate(270deg) saturate(5) contrast(1.5)' },
      { name: 'Night vision',  value: 'sepia(1) hue-rotate(85deg) saturate(6) brightness(0.7)' },
      { name: 'X-ray',         value: 'invert(1) grayscale(1) contrast(2) brightness(1.3)' },
      { name: 'Neon',          value: 'contrast(1.8) saturate(7) brightness(1.2) hue-rotate(300deg)' },
      { name: 'Sunset',        value: 'hue-rotate(-40deg) saturate(3) brightness(1.1) contrast(1.3)' },
      { name: 'Underwater',    value: 'hue-rotate(170deg) saturate(2.5) brightness(0.75) contrast(1.2)' },
      { name: 'Bleach bypass', value: 'contrast(2.2) saturate(0.15) brightness(1.1)' },
      { name: 'Infrared',      value: 'invert(1) hue-rotate(145deg) saturate(4)' },
      { name: 'Dream',         value: 'brightness(1.6) contrast(0.6) saturate(2) blur(1.5px)' },
      { name: 'Deep purple',   value: 'hue-rotate(250deg) saturate(5) contrast(1.4) brightness(0.85)' },
      { name: 'Thermal',       value: 'grayscale(1) invert(1) sepia(1) hue-rotate(10deg) saturate(6) contrast(1.5)' },
    ];

    let filterActive = true;
    let lastFilter = -1;
    const filterBtn = document.getElementById('filterBtn');
    const filterName = document.getElementById('filterName');

    // Start with filters on
    filterBtn.classList.add('active');
    nextRandomFilter();

    filterBtn.addEventListener('click', () => {
      if (filterActive) {
        filterActive = false;
        vidA.style.filter = 'none';
        vidB.style.filter = 'none';
        filterName.textContent = '';
        filterBtn.classList.remove('active');
      } else {
        filterActive = true;
        filterBtn.classList.add('active');
        nextRandomFilter();
      }
    });
  </script>
</body>
</html>
